name: CT (Continuous Training)

on:
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retraining even if no improvement expected"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  continuous-training:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download processed data (DVC)
        run: |
          pip install dvc[dvc-gcs]
          dvc pull data/processed || echo "No DVC remote configured, skipping"

      - name: Run training pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
          FORCE_RETRAIN: ${{ github.event.inputs.force_retrain || 'false' }}
        run: |
          python -m src.training.train

      - name: Evaluate new models
        run: |
          python -c "
          import mlflow
          mlflow.set_tracking_uri('${{ vars.MLFLOW_TRACKING_URI }}')

          # Get best model from registry
          client = mlflow.tracking.MlflowClient()
          model_name = 'recengine-model-a'
          versions = client.search_model_versions(f\"name='{model_name}'\")

          if versions:
              print(f'Found {len(versions)} model versions')
              best_version = max(versions, key=lambda v: int(v.version))
              print(f'Best version: {best_version.version}')
          else:
              print('No model versions found')
          "

      - name: Promote to staging if improved
        run: |
          python -m src.training.promote || echo "No promotion needed"

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-results
          path: |
            data/processed/
            notebooks/*_evaluation.ipynb
          retention-days: 30

      - name: Notify on Slack (optional)
        if: always()
        run: |
          echo "Training completed - check MLflow for results"
          # Add Slack/Teams notification here if needed
