services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-ab_test}
      - SPLIT_RATIO=${SPLIT_RATIO:-0.5}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5000
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
    working_dir: /mlruns
    command: >
      bash -c "pip install mlflow==2.10.0 &&
               mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlruns"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - LOG_DIR=/app/data/logs
      - REPORT_DIR=/app/data/reports
    volumes:
      - ./data:/app/data
    command: >
      bash -c "streamlit run src/dashboard/app.py
               --server.port=8501
               --server.address=0.0.0.0
               --server.headless=true"
    depends_on:
      - api
    restart: unless-stopped
